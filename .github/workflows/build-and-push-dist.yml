name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to the new branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        run: bun run build

      - name: Prepare Dist Directory
        run: |
          # Create a root folder to hold all the build outputs
          mkdir -p deploy-dist
          
          # Copy the dist folders from each workspace package
          # We check if they exist first, just in case
          if [ -d "client/dist" ]; then cp -r client/dist deploy-dist/client-dist; fi
          if [ -d "server/dist" ]; then cp -r server/dist deploy-dist/server-dist; fi
          if [ -d "shared/dist" ]; then cp -r shared/dist deploy-dist/shared-dist; fi

      - name: Push Dist to New Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-dist
          publish_branch: build-output # The branch where the dist will be pushed
          commit_message: "chore: deploy dist folder [skip ci]"
          force_orphan: true # Keeps the branch history clean with only the latest build
