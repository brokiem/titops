name: Build Client

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to the new branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Type Check Server
        run: bun run type-check

      - name: Build Client
        run: bun run build

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy-dist

          cp package.json bun.lock tsconfig.json deploy-dist/

          mkdir -p deploy-dist/client deploy-dist/server deploy-dist/shared

          cp client/package.json deploy-dist/client/
          cp -r client/dist deploy-dist/client/dist

          cp server/package.json server/tsconfig.json deploy-dist/server/
          cp -r server/src deploy-dist/server/src
          if [ -f "server/.env.example" ]; then
            cp server/.env.example deploy-dist/server/
          fi

          cp shared/package.json shared/tsconfig.json deploy-dist/shared/
          cp -r shared/src deploy-dist/shared/src

      - name: Push Dist to New Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-dist
          publish_branch: build-output
          commit_message: "chore: deploy build output [skip ci]"
          force_orphan: true
